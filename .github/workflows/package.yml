name: conda-build
on:
  # We would like to trigger for CI for any pull request action -
  # both from QuantCo's branches as well as forks.
  pull_request:
  # In addition to pull requests, we want to run CI for pushes
  # to the main branch and tags.
  push:
    branches:
      - "main"
    tags:
      - "*"
    paths:
      - ".github/**"
      - "conda.recipe/**"

jobs:
  build:
    name: ${{ matrix['variant-file'] }}
    runs-on: ${{ matrix.os }}
    env:
      CI: True
    strategy:
      fail-fast: false
      matrix:
        include:
          - { variant-file: linux_64_python3.10.____cpython,  target-platform: linux-64,  os: ubuntu-latest,  rattler-build-args: '' }
          - { variant-file: linux_64_python3.13.____cp313,    target-platform: linux-64,  os: ubuntu-latest,  rattler-build-args: '' }
          - { variant-file: osx_64_python3.10.____cpython,    target-platform: osx-64,    os: macos-15-intel, rattler-build-args: '' }
          - { variant-file: osx_arm64_python3.10.____cpython, target-platform: osx-arm64, os: macos-latest,   rattler-build-args: '' }
          - { variant-file: osx_arm64_python3.13.____cp313,   target-platform: osx-arm64, os: macos-latest,   rattler-build-args: '' }
          - { variant-file: win_64_python3.10.____cpython,    target-platform: win-64,    os: windows-2022,   rattler-build-args: '' }
          - { variant-file: win_64_python3.13.____cp313,      target-platform: win-64,    os: windows-2022,   rattler-build-args: '' }

    steps:
      - name: Checkout branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Get git metadata
        id: git-metadata
        shell: bash
        run: |
          if [ -f .git/shallow ]; then
            git fetch --prune --unshallow
          fi
          GIT_DESCRIBE_TAG="$(git describe --tags --abbrev=0 || echo UNKNOWN)"
          echo GIT_DESCRIBE_TAG=${GIT_DESCRIBE_TAG} >> $GITHUB_OUTPUT
          GIT_DESCRIBE_HASH=g"$(git rev-parse --short HEAD || echo UNKNOWN)"
          echo GIT_DESCRIBE_HASH=${GIT_DESCRIBE_HASH} >> $GITHUB_OUTPUT
          GIT_DESCRIBE_NUMBER="$(git rev-list --count ${GIT_DESCRIBE_TAG}..HEAD || echo UNKNOWN)"
          echo GIT_DESCRIBE_NUMBER=$GIT_DESCRIBE_NUMBER >> $GITHUB_OUTPUT

      - uses: prefix-dev/rattler-build-action@1ca5f45832f419a46d1326ccc5861d7e14d67c44 # v0.2.39
        with:
          recipe-path: conda.recipe/recipe.yaml
          build-args: -m .ci_support/${{ matrix['variant-file'] }}.yaml --target-platform ${{ matrix['target-platform'] }} ${{ matrix['rattler-build-args'] }}
          artifact-name: package-${{ matrix['variant-file'] }}
        env:
          GIT_DESCRIBE_TAG: ${{ steps.git-metadata.outputs.GIT_DESCRIBE_TAG }}
          GIT_DESCRIBE_HASH: ${{ steps.git-metadata.outputs.GIT_DESCRIBE_HASH }}
          GIT_DESCRIBE_NUMBER: ${{ steps.git-metadata.outputs.GIT_DESCRIBE_NUMBER }}
